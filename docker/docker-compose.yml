# =============================================================================
# CDS Platform — Development Environment
#
# Minimum viable: PostgreSQL + Redis
# Run: docker compose -f docker/docker-compose.yml up -d
# =============================================================================

services:
  # --- PostgreSQL 17 ---
  postgres:
    image: postgres:17-alpine
    container_name: cds-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cds_platform
      POSTGRES_USER: cds
      POSTGRES_PASSWORD: cds_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-schemas.sql:/docker-entrypoint-initdb.d/01-init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cds -d cds_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis 7 ---
  redis:
    image: redis:7-alpine
    container_name: cds-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

